<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Litpax Initiative Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="screen active">
    <header class="topbar">
      <div class="brand small">
        <div class="brand-mark">⚡</div>
        <div class="brand-name"><span id="brandNameAdmin">Initiative Tracker</span> <span style="color:var(--indigo)">· Admin</span></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" onclick="loadAll()">↻ Refresh</button>
      </div>
    </header>

    <main class="container admin-container">
      <div class="dash-head">
        <div>
          <h1 class="dash-title">Team Overview</h1>
          <p class="dash-sub">Kaun kya improvement kar raha hai — sab ek jagah. Employee card pe click karke filter karo.</p>
        </div>
      </div>

      <!-- Overall stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">Total Initiatives</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-num" id="statPending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card progress">
          <div class="stat-num" id="statProgress">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card done">
          <div class="stat-num" id="statDone">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>

      <!-- Main view tabs -->
      <div class="filter-tabs" style="margin-bottom: 22px;">
        <button class="tab main-tab active" id="tabAll" onclick="setView('all')">📋 All Initiatives</button>
        <button class="tab main-tab" id="tabFunds" onclick="setView('funds')">💰 Funds Required <span id="fundsCount" class="funds-count"></span></button>
      </div>

      <!-- ============ VIEW: ALL INITIATIVES ============ -->
      <div id="viewAll">

      <!-- Per-employee cards -->
      <div id="empGrid" class="emp-stats-grid">
        <div class="loader">Loading team data...</div>
      </div>

      <!-- Status filter -->
      <div class="filter-tabs" id="filterTabs">
        <button class="tab active" data-filter="All" onclick="setFilter('All', this)">All</button>
        <button class="tab" data-filter="Pending" onclick="setFilter('Pending', this)">Pending</button>
        <button class="tab" data-filter="In Progress" onclick="setFilter('In Progress', this)">In Progress</button>
        <button class="tab" data-filter="Completed" onclick="setFilter('Completed', this)">Completed</button>
      </div>

      <!-- All tasks -->
      <div id="taskList" class="task-list">
        <div class="loader">Loading initiatives...</div>
      </div>

      </div><!-- /viewAll -->

      <!-- ============ VIEW: FUNDS REQUIRED ============ -->
      <div id="viewFunds" class="hidden">
        <div id="fundsList" class="task-list">
          <div class="loader">Loading funds requests...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
